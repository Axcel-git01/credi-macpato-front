<div class="login-container">
  <div class="login-box">
    <app-form-card [actions]="true">
      <h1>Credi-MacPato</h1>
      <p>Ingresa tus credenciales para continuar</p>

      @if (errorMsg()) {
        <div class="error-alert">{{ errorMsg() }}</div>
      }

      <form [formGroup]="form" (ngSubmit)="onLogin()">
        <app-text-field
          [label]="'Usuario'"
          [control]="form.controls.username"
          [placeholder]="'Ej: rico.mcpato'"
          [error]="form.controls.username.touched && form.controls.username.invalid ? 'Usuario requerido' : undefined" />

        <app-password-field
          [label]="'Contraseña'"
          [control]="form.controls.password"
          [error]="form.controls.password.touched && form.controls.password.invalid ? 'Contraseña requerida' : undefined" />

        <div actions>
          <app-submit-bar
            [loading]="loading()"
            [submitText]="'Iniciar sesión'"
            [cancelText]="'Registrarme'"
            (cancel)="goToRegister()" />
        </div>
      </form>
    </app-form-card>
  </div>
</div>
